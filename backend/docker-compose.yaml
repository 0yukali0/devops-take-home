version: "3.8"

services:
  traefik:
    image: traefik:v3
    ports:
      - "80:80"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic
    networks:
      - backend
    restart: unless-stopped

  app:
    image: backend:${VERSION:-dev}
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/ems
      - PG_URI=postgresql://postgres:postgres@postgres:5432/ems
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - postgres
      - redis
    networks:
      - backend
    restart: unless-stopped

  collector:
    image: backend:${VERSION:-dev}
    command: ["node", "dist/collector.js"]
    environment:
      - MONGO_URI=mongodb://mongo:27017/ems
      - COLLECT_INTERVAL_MS=10000
    depends_on:
      - mongo
    networks:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    command: mongod --wiredTigerCacheSizeGB 4
    networks:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ems
    networks:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    name: backend_default
