name: E2E Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example (docker-compose requires the file to exist)
        run: cp backend/.env.example backend/.env

      - name: Run e2e validation test (tasks 9.1–9.5)
        run: make e2e-test
