kube-prometheus-stack:
  prometheusOperator:
    enabled: true

  prometheus:
    enabled: true
    prometheusSpec:
      storageSpec: {}

  grafana:
    enabled: true
    persistence:
      enabled: false
    additionalDataSources:
      - name: Tempo
        type: tempo
        # URL uses the Helm release name (metric-dashboard) + subchart name (tempo)
        url: http://metric-dashboard-tempo.monitoring.svc.cluster.local:3200
        access: proxy
        jsonData:
          httpMethod: GET

  alertmanager:
    enabled: true

# Tempo tracing backend (grafana-community/tempo chart)
tempo:
  tempo:
    retention: 24h
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
  persistence:
    enabled: false

# Grafana Alloy — OTLP trace collector pipeline
# NodePort 30317 (gRPC) and 30318 (HTTP) are exposed via charts/templates/alloy-otlp-nodeport.yaml
# Override cluster label at install time: --set alloy.clusterName=<env>
alloy:
  clusterName: "default"
  alloy:
    configMap:
      content: |
        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          http {
            endpoint = "0.0.0.0:4318"
          }
          output {
            traces = [otelcol.processor.transform.add_cluster.input]
          }
        }

        otelcol.processor.transform "add_cluster" {
          error_mode = "ignore"
          trace_statements {
            context    = "resource"
            statements = ["set(attributes[\"cluster\"], \"{{ .Values.clusterName }}\")"]
          }
          output {
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }

        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "{{ .Release.Name }}-tempo.{{ .Release.Namespace }}.svc.cluster.local:4317"
            tls {
              insecure = true
            }
          }
        }
