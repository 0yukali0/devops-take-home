apiVersion: v1
kind: Service
metadata:
  name: tempo-otlp-nodeport
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
      nodePort: 30317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
      nodePort: 30318
